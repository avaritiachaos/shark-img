name: Optimize Images

on:
  push:
    paths:
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebP tools
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Generate WebP + LQIP
        run: |
          mkdir -p webp lqip
          shopt -s nullglob
          for f in *.png *.jpg *.jpeg; do
            base="${f%.*}"
            # WebP (quality 90, visually lossless)
            if [ ! -f "webp/${base}.webp" ] || [ "$f" -nt "webp/${base}.webp" ]; then
              echo "[WebP] $f -> webp/${base}.webp"
              cwebp -q 90 -m 6 "$f" -o "webp/${base}.webp"
            fi
            # LQIP (tiny placeholder, ~1KB)
            if [ ! -f "lqip/${base}.webp" ] || [ "$f" -nt "lqip/${base}.webp" ]; then
              echo "[LQIP] $f -> lqip/${base}.webp"
              cwebp -q 20 -resize 40 0 "$f" -o "lqip/${base}.webp"
            fi
          done

      - name: Commit optimized images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add webp/ lqip/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: generate WebP + LQIP optimized images"
            git push
          fi
